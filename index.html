<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kelime Bulmaca</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --purple:#7c3aed; --purple-light:#a855f7; --cell-bg:rgba(255,255,255,0.88);
  --cell-filled:#6d28d9; --cell-hl:#c4b5fd; --gold:#f5c518;
}
body {
  font-family:'Nunito',sans-serif;
  background:linear-gradient(180deg,#1a6fd4 0%,#2f9ce8 30%,#5bbcf5 55%,#87d8f7 75%,#c5eef5 90%,#d9f5e8 100%);
  min-height:100vh; display:flex; justify-content:center; overflow-x:hidden;
}
.game-container {
  width:100%; max-width:430px; min-height:100vh; position:relative;
  display:flex; flex-direction:column; align-items:center; overflow:hidden;
}
.bg-scene { position:absolute; inset:0; pointer-events:none; z-index:0; }
.cloud { position:absolute; background:rgba(255,255,255,.65); border-radius:50px; filter:blur(2px); }
.cloud::before,.cloud::after { content:''; position:absolute; background:inherit; border-radius:inherit; }
.c1{width:120px;height:36px;top:16%;left:-15%;animation:cmove 18s linear infinite;}
.c1::before{width:70px;height:48px;top:-18px;left:20px;}
.c1::after{width:50px;height:32px;top:-8px;left:60px;}
.c2{width:90px;height:26px;top:26%;right:-5%;animation:cmove2 23s linear infinite;opacity:.6;}
.c2::before{width:50px;height:38px;top:-14px;left:15px;}
.c3{width:60px;height:20px;top:21%;left:55%;animation:cmove 28s linear infinite reverse;opacity:.45;}
@keyframes cmove{from{transform:translateX(-220px)}to{transform:translateX(520px)}}
@keyframes cmove2{from{transform:translateX(320px)}to{transform:translateX(-420px)}}
.buildings{position:absolute;bottom:0;left:0;right:0;height:42%;
  background:radial-gradient(ellipse 300px 180px at 28% 100%,rgba(30,80,50,.55) 0%,transparent 70%),
             radial-gradient(ellipse 200px 140px at 72% 100%,rgba(30,80,50,.45) 0%,transparent 60%);}
.spire{position:absolute;bottom:28%;left:50%;transform:translateX(-50%);
  width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;
  border-bottom:85px solid rgba(75,45,130,.55);filter:drop-shadow(0 0 8px rgba(100,60,200,.4));}
.castle{position:absolute;bottom:20%;right:14%;width:78px;height:58px;
  background:rgba(130,90,170,.38);border-radius:4px 4px 0 0;}
.castle::before{content:'';position:absolute;top:-14px;left:0;right:0;height:14px;
  background:repeating-linear-gradient(90deg,rgba(130,90,170,.38) 0,rgba(130,90,170,.38) 12px,transparent 12px,transparent 20px);}
.top-bar{position:relative;z-index:10;width:100%;display:flex;justify-content:space-between;
  align-items:center;padding:14px 16px 8px;}
.gem-counter{background:linear-gradient(135deg,#1e40af,#3b82f6);border:2px solid rgba(255,255,255,.4);
  border-radius:22px;padding:6px 14px 6px 10px;display:flex;align-items:center;gap:6px;
  box-shadow:0 3px 10px rgba(0,0,0,.2);}
.gem-count{color:white;font-weight:900;font-size:16px;}
.settings-btn{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);
  border:2px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;color:white;transition:transform .2s;}
.settings-btn:hover{transform:rotate(45deg);}
.clue-card{position:relative;z-index:10;background:rgba(255,255,255,.93);border-radius:16px;
  padding:13px 18px;margin:6px 16px;width:calc(100% - 32px);text-align:center;
  box-shadow:0 4px 16px rgba(0,0,0,.12);min-height:58px;display:flex;align-items:center;
  justify-content:center;gap:10px;}
.clue-text{font-family:'Baloo 2',cursive;font-size:17px;font-weight:700;color:#1e293b;line-height:1.35;flex:1;}
.clue-icon{font-size:22px;flex-shrink:0;}
.grid-area{position:relative;z-index:10;width:100%;display:flex;justify-content:center;
  align-items:center;padding:8px 0;}
.crossword-grid{position:relative;}
.grid-row{display:flex;}
.grid-cell{
  margin:2px;background:var(--cell-bg);border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Baloo 2',cursive;font-weight:800;color:transparent;
  box-shadow:0 3px 0 rgba(0,0,0,.12);
  transition:background .25s,color .25s,transform .25s;
  position:relative;
}
.grid-cell.empty{background:transparent;box-shadow:none;}
.grid-cell.filled{background:var(--cell-filled);color:white;box-shadow:0 3px 0 rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.2);}
.grid-cell.highlighted{background:var(--cell-hl);box-shadow:0 3px 0 rgba(100,50,200,.3),0 0 0 2px var(--purple);animation:pcell .8s ease-in-out infinite alternate;}
@keyframes pcell{from{transform:scale(1)}to{transform:scale(1.05)}}
.grid-cell.popin{animation:popin .4s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes popin{0%{transform:scale(.4);opacity:.4}100%{transform:scale(1);opacity:1}}
.gems-sidebar{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:7px;z-index:10;}
.sidebar-gem{width:26px;height:26px;
  background:linear-gradient(135deg,#34d399,#10b981);
  clip-path:polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%);
  opacity:.3;transition:opacity .4s,transform .4s;}
.sidebar-gem.earned{opacity:1;transform:scale(1.12);}
.current-word{position:relative;z-index:10;min-height:44px;
  display:flex;align-items:center;justify-content:center;margin:2px 0;}
.word-badge{background:var(--purple);color:white;font-family:'Baloo 2',cursive;
  font-weight:800;font-size:20px;padding:8px 28px;border-radius:30px;
  box-shadow:0 4px 16px rgba(109,40,217,.5);letter-spacing:3px;
  opacity:0;transform:translateY(8px);transition:all .2s;}
.word-badge.show{opacity:1;transform:translateY(0);}
.circle-wrap{position:relative;z-index:10;width:230px;height:230px;margin:6px auto;flex-shrink:0;}
.circle-bg{position:absolute;inset:0;background:rgba(255,255,255,.72);border-radius:50%;
  box-shadow:0 8px 32px rgba(0,0,0,.15),inset 0 2px 8px rgba(255,255,255,.8);backdrop-filter:blur(4px);}
.shuffle-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.6);
  border:2px solid rgba(200,180,255,.5);font-size:22px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .3s,background .2s;z-index:5;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.shuffle-btn:active{transform:translate(-50%,-50%) rotate(180deg);}
.letter-btn{position:absolute;width:50px;height:50px;border-radius:50%;background:white;
  border:3px solid rgba(200,180,255,.4);font-family:'Baloo 2',cursive;font-weight:800;font-size:21px;
  color:#1e293b;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transform:translate(-50%,-50%);transition:all .15s;
  box-shadow:0 4px 0 rgba(0,0,0,.1),0 2px 8px rgba(0,0,0,.08);
  user-select:none;-webkit-user-select:none;z-index:4;}
.letter-btn:hover{transform:translate(-50%,-50%) scale(1.1);background:#f3e8ff;border-color:var(--purple-light);}
.letter-btn.selected{background:var(--purple);color:white;border-color:var(--purple);
  transform:translate(-50%,-50%) scale(1.15);
  box-shadow:0 4px 0 rgba(80,20,180,.4),0 0 12px rgba(168,85,247,.5);}
.circle-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:3;}
.draw-line{stroke:var(--purple);stroke-width:5;stroke-linecap:round;stroke-linejoin:round;fill:none;opacity:.7;}
.bottom-bar{position:relative;z-index:10;width:100%;
  display:flex;justify-content:space-between;align-items:center;padding:8px 20px 20px;}
.skip-btn{width:52px;height:52px;border-radius:50%;background:rgba(30,64,175,.6);
  border:2px solid rgba(255,255,255,.3);color:white;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 10px rgba(0,0,0,.2);transition:transform .15s;}
.skip-btn:hover{transform:scale(1.08);}
.hint-btn{background:rgba(30,64,175,.6);border:2px solid rgba(255,255,255,.3);border-radius:26px;
  color:white;font-weight:800;font-size:14px;padding:10px 18px;cursor:pointer;
  display:flex;align-items:center;gap:6px;box-shadow:0 3px 10px rgba(0,0,0,.2);transition:transform .15s;}
.hint-btn:hover{transform:scale(1.05);}
.feedback{position:fixed;top:35%;left:50%;transform:translateX(-50%) scale(0);z-index:100;
  background:var(--purple);color:white;font-family:'Baloo 2',cursive;font-weight:800;font-size:26px;
  padding:12px 34px;border-radius:50px;box-shadow:0 8px 32px rgba(109,40,217,.5);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;opacity:0;letter-spacing:2px;
  pointer-events:none;white-space:nowrap;}
.feedback.show{transform:translateX(-50%) scale(1);opacity:1;}
.feedback.hide{transform:translateX(-50%) scale(.7) translateY(-20px);opacity:0;}
.level-complete{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s;}
.level-complete.show{opacity:1;pointer-events:all;}
.level-card{background:white;border-radius:24px;padding:40px 32px;text-align:center;
  max-width:320px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.3);
  transform:scale(.8);transition:transform .4s cubic-bezier(.34,1.56,.64,1);}
.level-complete.show .level-card{transform:scale(1);}
.level-title{font-family:'Baloo 2',cursive;font-size:32px;font-weight:800;color:var(--purple);}
.level-stars{font-size:40px;margin:12px 0;}
.level-score{font-size:16px;color:#64748b;margin-bottom:20px;}
.next-btn{background:linear-gradient(135deg,#7c3aed,#a855f7);color:white;border:none;
  font-family:'Baloo 2',cursive;font-weight:800;font-size:18px;padding:14px 40px;
  border-radius:50px;cursor:pointer;box-shadow:0 6px 20px rgba(109,40,217,.4);transition:transform .15s;}
.next-btn:hover{transform:scale(1.05);}
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:150;overflow:hidden;}
.confetti-piece{position:absolute;border-radius:2px;animation:fall linear forwards;}
@keyframes fall{from{transform:translateY(-20px) rotate(0deg);opacity:1}to{transform:translateY(110vh) rotate(720deg);opacity:0}}
.sparkle{position:fixed;pointer-events:none;z-index:20;font-size:18px;font-weight:900;
  color:var(--gold);animation:spanim .9s ease-out forwards;}
@keyframes spanim{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-55px) scale(.7)}}
</style>
</head>
<body>
<div class="game-container">
  <div class="bg-scene">
    <div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>
    <div class="buildings"></div><div class="spire"></div><div class="castle"></div>
  </div>
  <div class="top-bar">
    <div class="gem-counter">💎 <span class="gem-count" id="gemCount">0</span></div>
    <button class="settings-btn" onclick="showFeedback('⚙ Ayarlar yakında!','#64748b')">⚙</button>
  </div>
  <div class="clue-card">
    <span class="clue-text" id="clueText">...</span>
    <span class="clue-icon" id="clueIcon">🔍</span>
  </div>
  <div class="grid-area">
    <div id="crosswordGrid" class="crossword-grid"></div>
    <div class="gems-sidebar" id="gemsSidebar"></div>
  </div>
  <div class="current-word">
    <div class="word-badge" id="wordBadge"></div>
  </div>
  <div class="circle-wrap" id="circleWrap">
    <div class="circle-bg"></div>
    <svg class="circle-svg" id="circleSvg" viewBox="0 0 230 230"></svg>
    <button class="shuffle-btn" onclick="shuffleLetters()" title="Karıştır">🔀</button>
  </div>
  <div class="bottom-bar">
    <button class="skip-btn" onclick="skipWord()" title="Geç">⏭</button>
    <div style="flex:1"></div>
    <button class="hint-btn" onclick="useHint()">💡 <span id="hintCount">0</span></button>
  </div>
</div>
<div class="feedback" id="feedback"></div>
<div class="confetti-container" id="confettiContainer"></div>
<div class="level-complete" id="levelComplete">
  <div class="level-card">
    <div class="level-title">🎉 Tebrikler!</div>
    <div class="level-stars" id="levelStars">⭐⭐⭐</div>
    <div class="level-score" id="levelScore"></div>
    <button class="next-btn" onclick="nextLevel()">Sıradaki Kelimeler →</button>
  </div>
</div>

// ═══════════════════════════════════════════════════════════
//  GAME STATE  (single source of truth)
// ═══════════════════════════════════════════════════════════
let currentLevel = 0;
let gridData   = [];   // gridData[r][c] = {letter, filled, wordIndices:[]} | null
let gridRows   = 0, gridCols = 0;
let wordStatus = [];   // 'pending' | 'solved'
let currentClueIdx = 0;

let letterPool  = [];  // letters available in the circle (may contain duplicates)
let letterOrder = [];  // display order = shuffled indices into letterPool
let selectedLetters = []; // [{poolIdx, letter}]

// ═══════════════════════════════════════════════════════════
//  LOCAL STORAGE & HAFIZA İŞLEMLERİ
// ═══════════════════════════════════════════════════════════
let completedLevels = JSON.parse(localStorage.getItem('wordGameCompleted')) || [];
let gemCount = parseInt(localStorage.getItem('wordGameGems'));
if(isNaN(gemCount)) gemCount = 151; // İlk başlangıç elmas sayısı
let hintCount = parseInt(localStorage.getItem('wordGameHints'));
if(isNaN(hintCount)) hintCount = 100; // İlk başlangıç ipucu sayısı

function saveGameData() {
  localStorage.setItem('wordGameGems', gemCount);
  localStorage.setItem('wordGameHints', hintCount);
  localStorage.setItem('wordGameCompleted', JSON.stringify(completedLevels));
}

function pickRandomLevel() {
  let available = [];
  for(let i = 0; i < LEVELS.length; i++) {
    if(!completedLevels.includes(i)) available.push(i);
  }
  
  // Tüm bölümler bittiyse hafızayı sıfırla ve yeniden başlat
  if(available.length === 0) {
    completedLevels = [];
    for(let i = 0; i < LEVELS.length; i++) available.push(i);
  }
  
  const randomIndex = Math.floor(Math.random() * available.length);
  currentLevel = available[randomIndex];
}

// ═══════════════════════════════════════════════════════════
//  GRID CONSTRUCTION
// ═══════════════════════════════════════════════════════════
function buildLevelGrid() {
  const words = LEVELS[currentLevel].words;
  let minR = Infinity, maxR = -Infinity, minC = Infinity, maxC = -Infinity;

  for (const w of words) {
    minR = Math.min(minR, w.row);
    maxR = Math.max(maxR, w.row + (w.dir === "V" ? w.word.length - 1 : 0));
    minC = Math.min(minC, w.col);
    maxC = Math.max(maxC, w.col + (w.dir === "H" ? w.word.length - 1 : 0));
  }
  gridRows = maxR - minR + 1;
  gridCols = maxC - minC + 1;
  gridData = Array.from({length: gridRows}, () => Array(gridCols).fill(null));

  for (let wi = 0; wi < words.length; wi++) {
    const w = words[wi];
    for (let i = 0; i < w.word.length; i++) {
      const r = w.row - minR + (w.dir === "V" ? i : 0);
      const c = w.col - minC + (w.dir === "H" ? i : 0);
      if (!gridData[r][c]) {
        gridData[r][c] = { letter: w.word[i], filled: false, wordIndices: [] };
      }
      if (!gridData[r][c].wordIndices.includes(wi)) {
        gridData[r][c].wordIndices.push(wi);
      }
    }
  }
  LEVELS[currentLevel]._minR = minR;
  LEVELS[currentLevel]._minC = minC;
}

function getWordCells(wi) {
  const lv = LEVELS[currentLevel];
  const w  = lv.words[wi];
  return Array.from({length: w.word.length}, (_, i) => ({
    r: w.row - lv._minR + (w.dir === "V" ? i : 0),
    c: w.col - lv._minC + (w.dir === "H" ? i : 0),
    letter: w.word[i]
  }));
}

// ═══════════════════════════════════════════════════════════
//  GRID DOM
// ═══════════════════════════════════════════════════════════
function renderGridDOM() {
  const container = document.getElementById('crosswordGrid');
  container.innerHTML = '';

  const maxW    = Math.min(340, window.innerWidth - 90);
  const cellSz  = Math.min(42, Math.floor(maxW / (gridCols + 0.5)));
  const fontSz  = Math.floor(cellSz * 0.44);

  for (let r = 0; r < gridRows; r++) {
    const rowEl = document.createElement('div');
    rowEl.className = 'grid-row';
    for (let c = 0; c < gridCols; c++) {
      const el = document.createElement('div');
      el.className = 'grid-cell';
      el.style.cssText = `width:${cellSz}px;height:${cellSz}px;font-size:${fontSz}px;`;
      el.dataset.r = r;
      el.dataset.c = c;
      if (!gridData[r][c]) {
        el.classList.add('empty');
      } else if (gridData[r][c].filled) {
        el.classList.add('filled');
        el.textContent = gridData[r][c].letter;
      }
      rowEl.appendChild(el);
    }
    container.appendChild(rowEl);
  }

  const sidebar = document.getElementById('gemsSidebar');
  sidebar.innerHTML = '';
  LEVELS[currentLevel].words.forEach((_, i) => {
    const gem = document.createElement('div');
    gem.className = 'sidebar-gem' + (wordStatus[i] === 'solved' ? ' earned' : '');
    gem.id = 'sideGem_' + i;
    sidebar.appendChild(gem);
  });

  highlightCurrentWord();
}

function refreshCell(r, c) {
  const el = document.querySelector(`.grid-cell[data-r="${r}"][data-c="${c}"]`);
  if (!el || !gridData[r][c]) return;
  el.classList.remove('empty', 'highlighted');
  if (gridData[r][c].filled) {
    el.classList.add('filled');
    el.textContent = gridData[r][c].letter;
    el.classList.add('popin');
    setTimeout(() => el.classList.remove('popin'), 450);
  }
}

function highlightCurrentWord() {
  document.querySelectorAll('.grid-cell.highlighted').forEach(el => el.classList.remove('highlighted'));
  if (wordStatus[currentClueIdx] === 'solved') return;
  getWordCells(currentClueIdx).forEach(({r, c}) => {
    if (gridData[r][c] && !gridData[r][c].filled) {
      const el = document.querySelector(`.grid-cell[data-r="${r}"][data-c="${c}"]`);
      if (el) el.classList.add('highlighted');
    }
  });
}

// ═══════════════════════════════════════════════════════════
//  LETTER POOL
// ═══════════════════════════════════════════════════════════
function buildLetterPool(wi) {
  const pool = LEVELS[currentLevel].words[wi].word.split('');
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool;
}

// ═══════════════════════════════════════════════════════════
//  LETTER CIRCLE
// ═══════════════════════════════════════════════════════════
function renderLetterCircle() {
  letterPool  = buildLetterPool(currentClueIdx);
  letterOrder = letterPool.map((_, i) => i);
  selectedLetters = [];
  drawCircle();
}

function drawCircle() {
  const wrap = document.getElementById('circleWrap');
  const svg  = document.getElementById('circleSvg');
  wrap.querySelectorAll('.letter-btn').forEach(el => el.remove());
  svg.innerHTML = '';

  const N = letterPool.length;
  const CX = 115, CY = 115, R = 82;

  if (selectedLetters.length > 1) {
    const pts = selectedLetters.map(s => {
      const pos = letterOrder.indexOf(s.poolIdx);
      const ang = (2 * Math.PI / N) * pos - Math.PI / 2;
      return { x: CX + R * Math.cos(ang), y: CY + R * Math.sin(ang) };
    });
    let d = `M ${pts[0].x} ${pts[0].y}`;
    for (let i = 1; i < pts.length; i++) d += ` L ${pts[i].x} ${pts[i].y}`;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d); path.setAttribute('class', 'draw-line');
    svg.appendChild(path);
  }

  for (let i = 0; i < N; i++) {
    const poolIdx = letterOrder[i];
    const ang = (2 * Math.PI / N) * i - Math.PI / 2;
    const btn = document.createElement('button');
    btn.className = 'letter-btn';
    btn.textContent = letterPool[poolIdx];
    btn.dataset.poolIdx = poolIdx;
    btn.style.left = (CX + R * Math.cos(ang)) + 'px';
    btn.style.top  = (CY + R * Math.sin(ang)) + 'px';
    if (selectedLetters.some(s => s.poolIdx === poolIdx)) btn.classList.add('selected');
    btn.addEventListener('pointerdown', e => { e.preventDefault(); onLetterPress(poolIdx); });
    wrap.appendChild(btn);
  }
}

// ═══════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════
function onLetterPress(poolIdx) {
  const pos = selectedLetters.findIndex(s => s.poolIdx === poolIdx);
  if (pos !== -1) {
    if (pos === selectedLetters.length - 1) selectedLetters.pop();
    updateWordBadge(); drawCircle(); return;
  }
  selectedLetters.push({ poolIdx, letter: letterPool[poolIdx] });
  updateWordBadge(); drawCircle();
  checkWordMatch(selectedLetters.map(s => s.letter).join(''));
}

function updateWordBadge() {
  const badge = document.getElementById('wordBadge');
  const word  = selectedLetters.map(s => s.letter).join('');
  badge.textContent = word;
  badge.classList.toggle('show', word.length > 0);
}

// ═══════════════════════════════════════════════════════════
//  WORD MATCHING
// ═══════════════════════════════════════════════════════════
function checkWordMatch(attempt) {
  const words = LEVELS[currentLevel].words;

  for (let wi = 0; wi < words.length; wi++) {
    if (wordStatus[wi] === 'solved') continue;
    if (words[wi].word === attempt) { solveWord(wi); return; }
  }

  const remaining = words.filter((_, i) => wordStatus[i] !== 'solved');
  if (remaining.length && attempt.length >= Math.max(...remaining.map(w => w.word.length))) {
    showFeedback('Yanlış! ❌', '#ef4444');
    setTimeout(() => { selectedLetters = []; updateWordBadge(); drawCircle(); }, 700);
  }
}

// ═══════════════════════════════════════════════════════════
//  SOLVE WORD
// ═══════════════════════════════════════════════════════════
function solveWord(wi) {
  wordStatus[wi] = 'solved';

  getWordCells(wi).forEach(({ r, c }) => {
    if (!gridData[r][c].filled) {
      gridData[r][c].filled = true;
      refreshCell(r, c);
    } else {
      const el = document.querySelector(`.grid-cell[data-r="${r}"][data-c="${c}"]`);
      if (el) el.classList.remove('highlighted');
    }
  });

  const sideGem = document.getElementById('sideGem_' + wi);
  if (sideGem) sideGem.classList.add('earned');

  const phrases = ['MUHTEŞEM! 🏆','HARİKA! ✨','SÜPER! 🎯','MÜKEMMEL! 💫','BRAVİSSİMO! 🌟'];
  showFeedback(phrases[Math.floor(Math.random() * phrases.length)], '#7c3aed');

  gemCount += 10;
  document.getElementById('gemCount').textContent = gemCount;
  saveGameData(); // Veriyi kaydet
  spawnSparkle('+10 💎');

  selectedLetters = [];
  updateWordBadge();

  const next = wordStatus.findIndex(s => s !== 'solved');
  if (next === -1) {
    setTimeout(showLevelComplete, 900);
  } else {
    currentClueIdx = next;
    updateClue();
    highlightCurrentWord();
  }
}

// ═══════════════════════════════════════════════════════════
//  CLUE
// ═══════════════════════════════════════════════════════════
function updateClue() {
  const w = LEVELS[currentLevel].words[currentClueIdx];
  document.getElementById('clueText').textContent = w.clue;
  document.getElementById('clueIcon').textContent = w.icon;
  renderLetterCircle();
}

// ═══════════════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════════════
function shuffleLetters() {
  for (let i = letterOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [letterOrder[i], letterOrder[j]] = [letterOrder[j], letterOrder[i]];
  }
  selectedLetters = []; updateWordBadge(); drawCircle();
}

function skipWord() {
  const next = wordStatus.findIndex((s, i) => s !== 'solved' && i !== currentClueIdx);
  if (next !== -1) {
    currentClueIdx = next; selectedLetters = [];
    updateWordBadge(); updateClue(); highlightCurrentWord();
  } else { showFeedback('Başka kelime yok!', '#64748b'); }
}

function useHint() {
  if (hintCount <= 0) { showFeedback('İpucu kalmadı!', '#f59e0b'); return; }
  const cells    = getWordCells(currentClueIdx);
  const unfilled = cells.find(({ r, c }) => !gridData[r][c].filled);
  if (!unfilled) return;

  hintCount -= 10;
  document.getElementById('hintCount').textContent = hintCount;
  saveGameData(); // Veriyi kaydet
  
  gridData[unfilled.r][unfilled.c].filled = true;
  refreshCell(unfilled.r, unfilled.c);
  showFeedback('İpucu kullanıldı 💡', '#f59e0b');

  if (cells.every(({ r, c }) => gridData[r][c].filled)) setTimeout(() => solveWord(currentClueIdx), 350);
}

// ═══════════════════════════════════════════════════════════
//  FEEDBACK & FX
// ═══════════════════════════════════════════════════════════
let fbTimer = null;
function showFeedback(msg, color = '#7c3aed') {
  const fb = document.getElementById('feedback');
  fb.textContent = msg; fb.style.background = color; fb.className = 'feedback show';
  if (fbTimer) clearTimeout(fbTimer);
  fbTimer = setTimeout(() => {
    fb.className = 'feedback hide';
    setTimeout(() => fb.className = 'feedback', 400);
  }, 1300);
}

function spawnSparkle(text) {
  const sp = document.createElement('div');
  sp.className = 'sparkle'; sp.textContent = text;
  sp.style.top = '65px'; sp.style.right = '65px';
  document.body.appendChild(sp);
  setTimeout(() => sp.remove(), 950);
}

function showLevelComplete() {
  spawnConfetti();
  document.getElementById('levelStars').textContent = '⭐⭐⭐';
  document.getElementById('levelScore').textContent =
    `Tüm kelimeleri buldun! +${LEVELS[currentLevel].words.length * 10} 💎`;
  document.getElementById('levelComplete').classList.add('show');
}

function nextLevel() {
  document.getElementById('levelComplete').classList.remove('show');
  
  // Bulunduğumuz bölümü tamamlananlara ekle ve kaydet
  if (!completedLevels.includes(currentLevel)) {
    completedLevels.push(currentLevel);
  }
  saveGameData();
  
  // Yeni rastgele bölüme geç
  pickRandomLevel();
  initLevel();
}

function spawnConfetti() {
  const colors = ['#a855f7','#f59e0b','#10b981','#3b82f6','#ef4444','#ec4899'];
  const cont = document.getElementById('confettiContainer');
  for (let i = 0; i < 65; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.width  = (7 + Math.random() * 9) + 'px';
    p.style.height = (7 + Math.random() * 9) + 'px';
    p.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
    p.style.animationDuration = (1.4 + Math.random() * 2) + 's';
    p.style.animationDelay    = Math.random() * 0.9 + 's';
    cont.appendChild(p);
    setTimeout(() => p.remove(), 4500);
  }
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
function initLevel() {
  document.getElementById('gemCount').textContent = gemCount;
  document.getElementById('hintCount').textContent = hintCount;
  
  wordStatus     = LEVELS[currentLevel].words.map(() => 'pending');
  currentClueIdx = 0;
  selectedLetters = [];
  buildLevelGrid();   // build single shared grid state
  renderGridDOM();    // render DOM from state
  updateClue();       // set clue + build letter pool
}

// Oyun başladığında ilk rastgele bölümü seç ve başlat
pickRandomLevel();
initLevel();
</script>
